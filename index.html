<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CoreHub Chat</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        
        .card {
            background: white;
            width: 800px;
            max-width: 95vw;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        #auth-section {
            padding: 40px;
            text-align: center;
        }
        
        #chat-layout {
            display: none;
            flex-direction: row;
            height: 550px;
        }
        
        #sidebar {
            width: 30%;
            border-right: 1px solid #ddd;
            background: #fff;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .section-title {
            font-size: 12px;
            padding: 8px 15px;
            background: #e9ecef;
            color: #555;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
            border-top: 1px solid #ddd;
        }
        
        #user-list,
        #group-list {
            overflow-y: auto;
        }
        
        #group-list {
            max-height: 150px;
        }
        
        #user-list {
            flex: 1;
        }
        
        .user-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .user-item:hover {
            background: #f0f2f5;
        }
        
        .user-item.active {
            background: #e4e6eb;
            font-weight: bold;
        }
        
        #main-chat {
            width: 70%;
            display: flex;
            flex-direction: column;
            background: #efeae2;
        }
        
        #chat-header {
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
        }
        
        #msg-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .msg {
            margin: 5px 0;
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 14px;
            max-width: 70%;
            word-wrap: break-word;
            position: relative;
        }
        
        .me {
            align-self: flex-end;
            background: #dcf8c6;
            border-bottom-right-radius: 2px;
        }
        
        .others {
            align-self: flex-start;
            background: #ffffff;
            border-bottom-left-radius: 2px;
        }
        
        #typing-indicator {
            padding: 0 20px;
            color: #888;
            font-size: 13px;
            font-style: italic;
            min-height: 20px;
            background: #efeae2;
        }
        
        .chat-controls {
            display: flex;
            padding: 15px;
            background: #f0f0f0;
            gap: 10px;
        }
        
        input[type="text"],
        input[type="password"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }
        
        .chat-controls input {
            flex: 1;
        }
        
        button {
            padding: 10px 20px;
            background: #1877f2;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover {
            background: #166fe5;
        }
        
        .add-group-box {
            display: flex;
            padding: 10px;
            gap: 5px;
            background: #fff;
        }
        
        .add-group-box input {
            flex: 1;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        
        .add-group-box button {
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div class="card">
        <div id="auth-section">
            <h2>Welcome to CoreHub</h2>
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
                <input type="text" id="user" placeholder="Username">
                <input type="password" id="pass" placeholder="Password">
                <div style="display: flex; gap: 10px;">
                    <button onclick="auth('login')" style="flex: 1;">Login</button>
                    <button onclick="auth('register')" style="background:#42b72a; flex: 1;">Register</button>
                </div>
            </div>
        </div>

        <div id="chat-layout">
            <div id="sidebar">
                <div class="sidebar-header">
                    <span id="my-profile-name">My Profile</span>
                    <button onclick="logout()" style="padding: 5px 10px; font-size: 12px; background: #dc3545; border-radius: 5px;">Logout</button>
                </div>

                <div class="add-group-box">
                    <input type="text" id="groupNameInput" placeholder="New Group Name...">
                    <button onclick="joinGroup()">+ Join</button>
                </div>

                <div class="section-title">GROUPS</div>
                <div id="group-list"></div>

                <div class="section-title">USERS</div>
                <div id="user-list"></div>
            </div>

            <div id="main-chat">
                <div id="chat-header">Select a user or group to start chatting</div>
                <div id="msg-box">
                    <p style="text-align:center; color:#888; margin-top: 50px;">Please select a conversation from the left menu.</p>
                </div>

                <div id="typing-indicator"></div>

                <div class="chat-controls">
                    <input type="text" id="msgInput" placeholder="Type a message..." disabled oninput="notifyTyping()">
                    <button id="sendBtn" onclick="sendMsg()" disabled>Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws;
        let myName = "";
        let myToken = "";
        let currentReceiver = "";
        let currentGroupId = 0;
        let typingTimeout;

        let offlineQueue = [];

        async function auth(type) {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            try {
                const res = await fetch(`http://localhost:8080/${type}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: u,
                        password: p
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    if (type === 'register') return alert("Registration successful!");

                    myName = u;
                    myToken = data.token;

                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('chat-layout').style.display = 'flex';
                    document.getElementById('my-profile-name').innerText = "Logged in as: " + u;

                    await fetchUsers();
                    await fetchGroups();
                    startWS(myToken);
                } else {
                    alert(data.message || "Authentication failed");
                }
            } catch (error) {
                console.error("Auth error:", error);
            }
        }

        async function joinGroup() {
            const name = document.getElementById('groupNameInput').value;
            if (!name) return;

            try {
                const res = await fetch(`http://localhost:8080/groups/join?token=${myToken}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: name
                    })
                });

                if (res.ok) {
                    document.getElementById('groupNameInput').value = '';
                    fetchGroups();
                } else {
                    alert("Failed to join group");
                }
            } catch (e) {
                console.error("Error joining group:", e);
            }
        }

        async function fetchGroups() {
            try {
                const res = await fetch(`http://localhost:8080/groups?token=${myToken}`);
                if (res.ok) {
                    const groups = await res.json();
                    const list = document.getElementById('group-list');
                    list.innerHTML = '';

                    if (groups && groups.length > 0) {
                        groups.forEach(g => {
                            const div = document.createElement('div');
                            div.className = 'user-item';
                            div.id = `group-${g.id}`;
                            div.innerHTML = `<span>👥 ${g.name}</span>`;
                            div.onclick = () => loadGroupChat(g.id, g.name);
                            list.appendChild(div);
                        });
                    }
                }
            } catch (error) {
                console.error("Error fetching groups:", error);
            }
        }

        async function loadGroupChat(groupId, groupName) {
            currentReceiver = "";
            currentGroupId = groupId;

            document.getElementById('chat-header').innerText = `Group: ${groupName}`;
            document.getElementById('msgInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;

            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`group-${groupId}`).classList.add('active');

            hideTypingIndicator();

            try {
                const res = await fetch(`http://localhost:8080/messages?token=${myToken}&group_id=${groupId}`);
                if (res.ok) {
                    const messages = await res.json();

                    console.log("📥 Group Messages from DB:", messages);

                    const box = document.getElementById('msg-box');
                    box.innerHTML = '';

                    if (messages && messages.length > 0) {
                        messages.forEach(msg => appendMessage(msg));
                    } else {
                        box.innerHTML = '<p style="text-align:center; color:#888; margin-top: 50px;">No messages yet.</p>';
                    }
                }
            } catch (error) {
                console.error("Error loading group chat:", error);
            }
        }

        async function fetchUsers() {
            try {
                const res = await fetch(`http://localhost:8080/users?token=${myToken}`);
                if (res.ok) {
                    const users = await res.json();
                    const list = document.getElementById('user-list');
                    list.innerHTML = '';

                    if (users && users.length > 0) {
                        users.forEach(u => {
                            const div = document.createElement('div');
                            div.className = 'user-item';
                            div.id = `user-${u.username}`;

                            const dot = u.online ? "🟢" : "";

                            div.innerHTML = `<span>👤 ${u.username}</span> <span class="status-indicator">${dot}</span>`;
                            div.onclick = () => loadChat(u.username);
                            list.appendChild(div);
                        });
                    }
                }
            } catch (error) {
                console.error("Error fetching users:", error);
            }
        }

        async function loadChat(receiver) {
            currentReceiver = receiver;
            currentGroupId = 0;

            document.getElementById('chat-header').innerText = `Chatting with: ${receiver}`;
            document.getElementById('msgInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;

            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`user-${receiver}`).classList.add('active');

            hideTypingIndicator();

            try {
                const res = await fetch(`http://localhost:8080/messages?token=${myToken}&with=${receiver}`);
                if (res.ok) {
                    const messages = await res.json();

                    console.log("📥 Messages from DB:", messages);

                    const box = document.getElementById('msg-box');
                    box.innerHTML = '';

                    if (messages && messages.length > 0) {
                        messages.forEach(msg => {
                            appendMessage(msg);

                            // 🌟 تحديث ذكي: إذا كانت الرسالة قادمة من الطرف الآخر وحالتها ليست delivered
                            // نرسل إشعار استلام فوراً عبر الـ WebSocket لتتحول عند الطرف الآخر إلى صحين زرق
                            if (msg.username !== myName && msg.status !== "delivered") {
                                if (ws && ws.readyState === WebSocket.OPEN) {
                                    ws.send(JSON.stringify({
                                        type: "delivery_ack",
                                        id: msg.id,
                                        receiver_username: msg.username
                                    }));
                                }
                            }
                        });
                    } else {
                        box.innerHTML = '<p style="text-align:center; color:#888; margin-top: 50px;">No messages yet.</p>';
                    }
                }
            } catch (error) {
                console.error("Error loading chat:", error);
            }
        }

        function logout() {
            if (ws) {
                ws.close();
            }
            document.getElementById('chat-layout').style.display = 'none';
            document.getElementById('auth-section').style.display = 'block';

            myName = "";
            myToken = "";
            currentReceiver = "";
            currentGroupId = 0;
            document.getElementById('msg-box').innerHTML = '';
        }

        function startWS(token) {
            ws = new WebSocket(`ws://localhost:8080/ws?token=${token}`);

            ws.onopen = () => {
                console.log("Connected to server");
                document.getElementById('my-profile-name').innerText = "Logged in as: " + myName;

                while (offlineQueue.length > 0) {
                    const savedPayload = offlineQueue.shift();
                    ws.send(JSON.stringify(savedPayload));
                }

                fetchUsers();
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);

                console.log("⚡ Live WS Message:", data);

                if (data.type === "status") {
                    updateUserStatus(data.username, data.content);
                } else if (data.type === "typing") {
                    if (data.username === currentReceiver) {
                        showTypingIndicator(data.username);
                    }
                } else if (data.type === "server_ack") {
                    const msgDiv = document.getElementById(`msg-${data.id}`);
                    if (msgDiv) {
                        const tickSpan = msgDiv.querySelector('.tick');
                        if (tickSpan) tickSpan.innerText = "✓";
                    }
                } else if (data.type === "delivery_ack") {
                    const msgDiv = document.getElementById(`msg-${data.id}`);
                    if (msgDiv) {
                        const tickSpan = msgDiv.querySelector('.tick');
                        if (tickSpan) {
                            tickSpan.innerText = "✓✓";
                            tickSpan.style.color = "#53bdeb";
                            tickSpan.style.fontWeight = "bold";
                        }
                    }
                } else if (data.type === "chat") {
                    if (data.username === myName) return;

                    if (data.group_id && data.group_id !== 0) {
                        if (data.group_id === currentGroupId) {
                            appendMessage(data);
                        }
                    } else {
                        if (!document.getElementById(`user-${data.username}`)) {
                            fetchUsers();
                        }

                        if (data.id) {
                            ws.send(JSON.stringify({
                                type: "delivery_ack",
                                id: data.id,
                                receiver_username: data.username
                            }));
                        }

                        if (data.username === currentReceiver) {
                            hideTypingIndicator();
                            appendMessage(data);
                        }
                    }
                }
            };

            ws.onclose = () => {
                console.log("Disconnected from server");
                const profileName = document.getElementById('my-profile-name');
                if (!profileName.innerText.includes("Offline")) {
                    profileName.innerText = "Logged in as: " + myName + " (Offline - Reconnecting...)";
                }
                document.querySelectorAll('.status-indicator').forEach(el => el.innerText = "");

                setTimeout(() => {
                    if (myToken !== "") {
                        startWS(myToken);
                    }
                }, 3000);
            };

            setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: "ping"
                    }));
                }
            }, 30000);
        }

        function updateUserStatus(username, status) {
            const userDiv = document.getElementById(`user-${username}`);
            if (userDiv) {
                const indicator = userDiv.querySelector('.status-indicator');
                if (status === "online") {
                    indicator.innerText = "🟢";
                } else {
                    indicator.innerText = "";
                }
            } else if (status === "online") {
                fetchUsers();
            }
        }

        function notifyTyping() {
            if (ws && ws.readyState === WebSocket.OPEN && currentReceiver !== "") {
                ws.send(JSON.stringify({
                    type: "typing",
                    receiver_username: currentReceiver
                }));
            }
        }

        function showTypingIndicator(username) {
            const ind = document.getElementById('typing-indicator');
            ind.innerText = `${username} is typing...`;

            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                ind.innerText = "";
            }, 1500);
        }

        function hideTypingIndicator() {
            const ind = document.getElementById('typing-indicator');
            if (ind) ind.innerText = "";
            clearTimeout(typingTimeout);
        }

        function sendMsg() {
            const msgInput = document.getElementById('msgInput');

            if (msgInput.value) {
                if (currentReceiver === "" && currentGroupId === 0) return;

                const uniqueId = Date.now().toString() + Math.floor(Math.random() * 1000).toString();
                const payload = {
                    id: uniqueId,
                    type: "chat",
                    content: msgInput.value,
                    username: myName
                };

                if (currentGroupId !== 0) {
                    payload.group_id = currentGroupId;
                } else {
                    payload.receiver_username = currentReceiver;
                }

                appendMessage(payload, "🕒");

                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify(payload));
                } else {
                    offlineQueue.push(payload);
                }

                msgInput.value = '';
            }
        }

        function appendMessage(data, tick = "") {
            const box = document.getElementById('msg-box');
            if (document.querySelector('#msg-box p')) box.innerHTML = '';

            const div = document.createElement('div');
            if (data.id) div.id = `msg-${data.id}`;

            if (data.username === myName) {
                div.className = `msg me`;

                let tickIcon = "✓";
                let tickColor = "#999";

                if (data.status === "delivered" || tick === "✓✓") {
                    tickIcon = "✓✓";
                    tickColor = "#53bdeb";
                } else if (tick === "🕒") {
                    tickIcon = "🕒";
                }

                div.innerHTML = `<b>${data.username}:</b><br>${data.content} <span class="tick" style="float:right; font-size:12px; color:${tickColor}; margin-left: 15px;">${tickIcon}</span>`;
            } else {
                div.className = `msg others`;
                div.innerHTML = `<b>${data.username}:</b><br>${data.content}`;
            }

            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>

</html>
